<!-- 
====================================================================
ORLAND MANAGEMENT - WIDGET TALENT HIGHLIGHT (MAX 5 ITEMS)
Bisa dipasang di Bagian Atas/Bawah Artikel atau Header/Footer Blogspot.
Desain Responsive: Grid 1-2 di HP, Grid 5 di Desktop!
==================================================================== 
-->
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
.orland-widget-wrap { font-family: 'Plus Jakarta Sans', sans-serif, system-ui; }
.orland-widget-wrap select, .orland-widget-wrap input { outline: none; }
</style>

<div class="orland-widget-wrap bg-white/80 backdrop-blur-xl p-4 md:p-6 rounded-3xl border border-slate-200 shadow-[0_4px_30px_rgba(0,0,0,0.04)] w-full mx-auto relative overflow-hidden">
    <!-- Gradient background effect -->
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-indigo-500/10 blur-[80px] rounded-full pointer-events-none"></div>

    <!-- HEADER -->
    <div class="flex flex-col md:flex-row items-start md:items-center justify-between border-b border-slate-100 pb-4 mb-5 gap-3 relative z-10">
        <h3 class="font-black text-xl md:text-2xl text-slate-900 tracking-tight flex items-center gap-2">
            <div class="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-500">
                <i class="fa-solid fa-users-viewfinder text-lg"></i>
            </div>
            Orland Spotlight
            <span class="bg-indigo-600 text-white px-2.5 py-1 rounded text-[10px] font-black uppercase tracking-widest shadow-md translate-y-[-2px]">5 Teratas</span>
        </h3>
        
        <button onclick="document.getElementById('otw-filters').classList.toggle('hidden'); document.getElementById('otw-filter-icon').classList.toggle('fa-chevron-down'); document.getElementById('otw-filter-icon').classList.toggle('fa-chevron-up');" class="flex items-center justify-center gap-2 bg-indigo-50 hover:bg-indigo-100 border border-indigo-100 text-indigo-600 text-xs font-bold px-5 py-3 rounded-xl transition-colors shadow-sm">
            <i class="fa-solid fa-sliders"></i> Filter Showcase <i id="otw-filter-icon" class="fa-solid fa-chevron-down ml-1 text-[10px]"></i>
        </button>
    </div>

    <!-- KOTAK FILTER DROPDOWN -->
    <div id="otw-filters" class="hidden animate-in fade-in slide-in-from-top-2 duration-300 relative z-10">
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6 bg-slate-50 border border-slate-200 p-4 rounded-2xl shadow-inner">
            
            <div class="flex flex-col gap-1.5"><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1">Category</label>
            <select id="otw-cat" onchange="runWidgetFilter()" class="w-full text-xs font-bold border border-slate-200 p-2.5 rounded-xl bg-white focus:border-indigo-500 focus:ring-2 ring-indigo-100">
                <option value="">Semua</option><option value="Actor">Actor</option><option value="Model">Model</option><option value="Singer">Singer</option><option value="Dancer">Dancer</option><option value="MC">Host / MC</option>
            </select></div>

            <div class="flex flex-col gap-1.5"><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1">Gender</label>
            <select id="otw-gender" onchange="runWidgetFilter()" class="w-full text-xs font-bold border border-slate-200 p-2.5 rounded-xl bg-white focus:border-indigo-500 focus:ring-2 ring-indigo-100">
                <option value="All">Semua</option><option value="Male">Male</option><option value="Female">Female</option>
            </select></div>

            <div class="flex flex-col gap-1.5"><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1">Usia / Umur</label>
            <select id="otw-age" onchange="runWidgetFilter()" class="w-full text-xs font-bold border border-slate-200 p-2.5 rounded-xl bg-white focus:border-indigo-500 focus:ring-2 ring-indigo-100">
                 <option value="">Semua Umur</option><option value="5-12">Anak (5-12)</option><option value="13-17">Remaja (13-17)</option><option value="18-25">Dewasa Muda (18-25)</option><option value="26-99">Dewasa (26+)</option>
            </select></div>

            <div class="flex flex-col gap-1.5"><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1">Scale (cm)</label>
            <select id="otw-height" onchange="runWidgetFilter()" class="w-full text-xs font-bold border border-slate-200 p-2.5 rounded-xl bg-white focus:border-indigo-500 focus:ring-2 ring-indigo-100">
                 <option value="">Semua Tinggi</option><option value="0-150">&lt; 150 cm</option><option value="150-165">150 - 165 cm</option><option value="165-175">165 - 175 cm</option><option value="175-300">&gt; 175 cm</option>
            </select></div>
            
            <!-- Lokasi & Reset -->
            <div class="flex flex-col gap-1.5 col-span-2 md:col-span-1"><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1">Lokasi</label>
                <div class="flex gap-2 w-full">
                    <select id="otw-loc" onchange="runWidgetFilter()" class="w-full text-[11px] font-bold border border-slate-200 p-2.5 rounded-xl bg-white focus:border-indigo-500 focus:ring-2 ring-indigo-100">
                        <option value="">Semua Kota</option>
                        <option value="jakarta">Jakarta</option><option value="surabaya">Surabaya</option><option value="bandung">Bandung</option><option value="medan">Medan</option><option value="semarang">Semarang</option><option value="makassar">Makassar</option><option value="palembang">Palembang</option><option value="bali">Bali</option><option value="yogyakarta">Yogyakarta</option><option value="malang">Malang</option><option value="solo">Solo</option><option value="balikpapan">Balikpapan</option><option value="batam">Batam</option><option value="pekanbaru">Pekanbaru</option><option value="luar indonesia">Luar Negara</option>
                    </select>
                    <button onclick="resetWidgetFilter()" title="Reset Filter" class="px-3 shrink-0 bg-red-50 text-red-500 rounded-xl border border-red-100 hover:bg-red-500 hover:text-white transition-colors"><i class="fa-solid fa-rotate-left"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- AREA RENDER TALENTS (5 GRID DESKTOP) -->
    <div id="otw-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 md:gap-5 relative min-h-[150px] z-10">
        <div class="col-span-full absolute inset-0 flex items-center justify-center bg-white/50 backdrop-blur-sm z-20 rounded-2xl">
            <div class="flex flex-col items-center">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl text-indigo-500 mb-3"></i>
                <p class="text-xs font-black text-slate-400 uppercase tracking-widest shadow-white">Sinkronisasi Data...</p>
            </div>
        </div>
    </div>

    <div class="mt-6 flex justify-center w-full pb-2 relative z-10">
        <a href="https://orlandmanagement.com/p/talent-roster.html" class="flex items-center gap-3 bg-slate-900 text-white w-full max-w-sm rounded-[14px] py-3.5 px-6 font-black text-xs tracking-widest uppercase hover:bg-slate-800 hover:-translate-y-1 hover:shadow-[0_10px_30px_rgba(15,23,42,0.2)] transition-all justify-center">
            Jelajahi Direktori Lengkap <div class="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center"><i class="fa-solid fa-arrow-right"></i></div>
        </a>
    </div>
</div>

<script>
    const OTW_API_BASE = "https://api.orlandmanagement.com/api/v1";
    let otwAllTalents = [];

    document.addEventListener("DOMContentLoaded", async () => {
        try {
            const response = await fetch(`${OTW_API_BASE}/public/talents`);
            const result = await response.json();
            if (result.status === 'ok') {
                otwAllTalents = result.data;
                runWidgetFilter(); // Render pertama
            }
        } catch (err) {
            document.getElementById("otw-grid").innerHTML = `<div class="col-span-full text-xs text-center text-red-500 font-bold py-10 border border-dashed border-red-200 bg-red-50 rounded-2xl">Gagal memuat API dari server utama.</div>`;
        }
    });

    function resetWidgetFilter() {
        document.getElementById("otw-cat").value = "";
        document.getElementById("otw-gender").value = "All";
        document.getElementById("otw-age").value = "";
        document.getElementById("otw-height").value = "";
        document.getElementById("otw-loc").value = "";
        runWidgetFilter();
    }

    function runWidgetFilter() {
        const cat = document.getElementById("otw-cat").value.toLowerCase();
        const gender = document.getElementById("otw-gender").value;
        const loc = document.getElementById("otw-loc").value.toLowerCase();
        const ageSelect = document.getElementById("otw-age").value;
        const heightSelect = document.getElementById("otw-height").value;

        // Proses Penyaringan (Filter)
        let filtered = otwAllTalents.filter(t => {
            if (cat && !(t.category || "").toLowerCase().includes(cat)) return false;
            if (gender !== "All" && t.gender !== gender) return false;
            if (loc && !(t.location || "").toLowerCase().includes(loc)) return false;

            if (ageSelect) {
                const parts = ageSelect.split("-");
                const min = parseInt(parts[0]); const max = parseInt(parts[1]);
                const tAge = parseInt(t.age) || 0;
                if (tAge < min || tAge > max) return false;
            }

            if (heightSelect) {
                const parts = heightSelect.split("-");
                const min = parseInt(parts[0]); const max = parseInt(parts[1]);
                const tHeight = parseInt(t.height) || 0;
                if (tHeight < min || tHeight > max) return false;
            }
            return true;
        });

        // 5 item
        const top5 = filtered.slice(0, 5);
        const grid = document.getElementById("otw-grid");

        if (top5.length === 0) {
            grid.innerHTML = `<div class="col-span-full text-center py-12 bg-slate-50 rounded-2xl border border-dashed border-slate-200"><div class="w-16 h-16 rounded-full bg-slate-100 flex items-center justify-center mx-auto mb-3"><i class="fa-solid fa-ghost text-slate-300 text-2xl"></i></div><p class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Tidak ada profil yang cocok.</p></div>`;
            return;
        }

        // Render card desktop grid responsive
        let html = "";
        top5.forEach((t, index) => {
            let icon = t.gender === 'Male' ? 'mars' : 'venus';
            let catName = t.category || 'Talent';
            let fallbackImg = `https://ui-avatars.com/api/?name=${encodeURIComponent(t.name)}&background=6366f1&color=fff&size=500`;

            // Tentukan tinggi grid agar variatif seperti batu bata / brick layout di desktop sedikit agar estetik jika mau, tapi kita buat uniform saja untuk 5 kolom.
            let delayClasses = ["delay-0", "delay-75", "delay-100", "delay-150", "delay-200"];
            
            html += `
            <a href="https://talent.orlandmanagement.com/p/${t.id}" target="_blank" class="group relative bg-white border border-slate-100 hover:border-indigo-300 rounded-[20px] overflow-hidden flex flex-col hover:shadow-[0_20px_40px_rgba(79,70,229,0.15)] hover:-translate-y-2 transition-all duration-500 animate-in fade-in slide-in-from-bottom-4 ${delayClasses[index]}">
                <div class="relative w-full aspect-[4/5] bg-slate-100 overflow-hidden">
                   <!-- Label Hover Overlay -->
                   <div class="absolute top-3 left-3 z-20">
                       <span class="bg-black/40 backdrop-blur text-white px-2 py-1 rounded text-[9px] font-black uppercase tracking-widest border border-white/20">${catName}</span>
                   </div>
                   <!-- Foto -->
                   <img src="${t.headshot || fallbackImg}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" loading="lazy" alt="Profile Foto" />
                   
                   <!-- Gradient Bawah -->
                   <div class="absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-t from-slate-900/90 via-slate-900/40 to-transparent"></div>
                   
                   <!-- Data di dalam Gambar -->
                   <div class="absolute bottom-0 left-0 w-full p-4 z-20">
                       <h4 class="font-black text-white text-base leading-tight mb-2 drop-shadow-md truncate">${t.name}</h4>
                       <div class="flex flex-wrap gap-1.5">
                           ${t.age ? `<div class="bg-white/20 backdrop-blur px-1.5 flex items-center justify-center py-0.5 rounded text-white text-[9px] font-bold border border-white/10"><i class="fa-solid fa-${icon} mr-1"></i>${t.age}</div>` : ''}
                           ${t.height ? `<div class="bg-white/20 backdrop-blur px-1.5 flex items-center justify-center py-0.5 rounded text-white text-[9px] font-bold border border-white/10"><i class="fa-solid fa-arrows-up-down mr-1"></i>${t.height}</div>` : ''}
                       </div>
                   </div>
                </div>
            </a>`;
        });

        grid.innerHTML = html;
    }
</script>
