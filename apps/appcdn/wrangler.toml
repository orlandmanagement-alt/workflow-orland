name = "cdn-workflow-orland"
main = "src/index.ts"
compatibility_date = "2024-03-26"

# R2 Bucket untuk semua media Orland
[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "orland-media"

# Binding secrets (set via: wrangler secret put JWT_SECRET)
# JWT_SECRET = "..."
# CF_ACCOUNT_ID = "..."
# R2_ACCESS_KEY_ID = "..."
# R2_SECRET_ACCESS_KEY = "..."
# R2_BUCKET_NAME = "orland-media"

[vars]
R2_BUCKET_NAME = "orland-media"

# Routes
# [env.production]
# routes = [{ pattern = "cdn.orlandmanagement.com", zone_name = "orlandmanagement.com" }]
