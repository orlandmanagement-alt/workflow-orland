    <section class="bg-white/80 backdrop-blur-xl border-b border-slate-200 pt-24 pb-4 px-4 relative z-20 shadow-[0_4px_20px_rgba(0,0,0,0.02)]">
        <div class="container mx-auto max-w-[1400px] flex flex-col md:flex-row items-center justify-between gap-3">

                <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/30 shrink-0 hidden sm:flex">

            <button onclick="toggleFilterSidebar()" aria-label="Buka Filter Menu" class="lg:hidden w-full md:w-auto px-5 py-2.5 bg-slate-900 text-white rounded-xl font-bold text-sm flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-transform">

            <div class="flex items-center justify-between lg:hidden mb-6 pb-4 border-b border-slate-200">

                <div>
                    <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-2">Search Name</label>
                    <div class="relative group">
                        <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
                        <input type="text" id="filterSearch" placeholder="Type a name..." class="w-full pl-10 pr-3 py-2.5 rounded-xl bg-slate-50 border border-slate-200 text-sm font-medium focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white outline-none transition-all shadow-inner">
                    </div>

                <div class="border-t border-slate-100 pt-5">
                    <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-2">Location</label>
                    <div class="relative group">
                        <select id="filterLocation" class="w-full px-3 py-2.5 rounded-xl bg-slate-50 border border-slate-200 text-sm font-medium text-slate-700 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white outline-none cursor-pointer">

                           <option value="makassar">Makassar</option>
                           <option value="palembang">Palembang</option>
                           <option value="bali">Bali</option>
                           <option value="yogyakarta">Yogyakarta</option>
                           <option value="malang">Malang</option>
                           <option value="solo">Solo</option>
                           <option value="balikpapan">Balikpapan</option>
                           <option value="banjarmasin">Banjarmasin</option>
                           <option value="batam">Batam</option>
                           <option value="pekanbaru">Pekanbaru</option>
                           <option value="luar">Luar Wilayah</option>
                        </select>
                    </div>
                </div>

                <div class="border-t border-slate-100 pt-5">
                    <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-2">Gender</label>
                    <div class="flex gap-2">
                        <label class="flex-1 cursor-pointer group">
                            <input type="radio" name="gender" value="All" class="peer sr-only" checked>
                            <div class="text-center py-2 text-xs font-bold rounded-lg border border-slate-200 text-slate-500 peer-checked:bg-slate-800 peer-checked:text-white peer-checked:border-slate-800 transition-all hover:bg-slate-50 shadow-sm peer-checked:shadow-md">All</div>
                        </label>
                        <label class="flex-1 cursor-pointer group">
                            <input type="radio" name="gender" value="Male" class="peer sr-only">
                            <div class="text-center py-2 text-xs font-bold rounded-lg border border-slate-200 text-slate-500 peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600 transition-all hover:bg-indigo-50 shadow-sm peer-checked:shadow-md peer-checked:shadow-indigo-500/30">M</div>
                        </label>
                        <label class="flex-1 cursor-pointer group">
                            <input type="radio" name="gender" value="Female" class="peer sr-only">
                            <div class="text-center py-2 text-xs font-bold rounded-lg border border-slate-200 text-slate-500 peer-checked:bg-rose-500 peer-checked:text-white peer-checked:border-rose-500 transition-all hover:bg-rose-50 shadow-sm peer-checked:shadow-md peer-checked:shadow-rose-500/30">F</div>

                <div class="border-t border-slate-100 pt-5">
                    <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-2">Category (Primary Skill)</label>
                    <select id="filterCategory" class="w-full px-3 py-2.5 rounded-xl bg-slate-50 border border-slate-200 text-sm font-medium text-slate-700 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white outline-none cursor-pointer">
                        <option value="">Semua Kategori</option>
                        <option value="Actor">Actor</option>
                        <option value="Model">Model</option>
                        <option value="MC">MC</option>
                        <option value="Dancer">Dancer</option>
                        <option value="Singer">Singer</option>
                    </select>
                </div>
                
                <div class="border-t border-slate-100 pt-5">
                    <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-2">Height (cm)</label>
                    <div class="relative group">
                        <select id="filterHeight" class="w-full px-3 py-2.5 rounded-xl bg-slate-50 border border-slate-200 text-sm font-medium text-slate-700 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white outline-none appearance-none cursor-pointer shadow-inner transition-all">
                            <option value="">Any Height</option>
                            <option value="0-149">&lt; 150 cm</option>
                            <option value="150-160">150 - 160 cm</option>
                            <option value="161-170">161 - 170 cm</option>
                            <option value="171-180">171 - 180 cm</option>
                            <option value="181-300">&gt; 180 cm</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-slate-400 pointer-events-none group-focus-within:text-indigo-500"></i>
                    </div>
                </div>

                <div class="border-t border-slate-100 pt-5">
                    <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-2">Screen Age</label>
                    <div class="relative group">
                        <select id="filterAge" class="w-full px-3 py-2.5 rounded-xl bg-slate-50 border border-slate-200 text-sm font-medium text-slate-700 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white outline-none appearance-none cursor-pointer shadow-inner transition-all">
                            <option value="">Any Age</option>
                            <option value="5-12">Kids (5-12)</option>
                            <option value="13-17">Teens (13-17)</option>
                            <option value="18-25">Young Adult (18-25)</option>
                            <option value="26-35">Adults (26-35)</option>
                            <option value="36-100">Mature (36+)</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-slate-400 pointer-events-none group-focus-within:text-indigo-500"></i>
                    </div>
                </div>

                <div class="pt-2">
                    <button onclick="resetFilters()" class="w-full flex items-center justify-center gap-2 py-2.5 bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white rounded-xl text-xs font-bold mt-2 transition-colors border border-rose-100">
                        <i class="fa-solid fa-rotate-right"></i> Reset All Filters
                    </button>
                </div>
            </div>
        </aside>

        <div class="flex-1 w-full">
            
            <div class="flex flex-col md:flex-row justify-between items-center bg-white p-3 md:p-4 rounded-3xl border border-slate-200 mb-6 gap-4 shadow-sm relative overflow-hidden">
                <div class="absolute right-0 top-0 w-32 h-32 bg-indigo-500/5 blur-2xl rounded-full"></div>
                <div class="flex flex-1 items-center gap-3 w-full relative z-10 pl-2">
                    <div class="p-2 bg-indigo-50 text-indigo-500 rounded-xl hidden sm:block">
                        <i class="fa-solid fa-address-book"></i>
                    </div>
                    <p class="text-sm font-medium text-slate-500">Showing <span id="totalCountDisplay" class="text-indigo-600 font-black text-xl px-2 bg-indigo-50 rounded-lg mx-1 inline-block border border-indigo-100">0</span> Talents from Database</p>
                </div>
                
                <!-- WADAH PAPAN PAGING API ATAS -->
                <div id="paginationControlsTop" class="flex items-center justify-center gap-1.5 w-full md:w-auto relative z-10 shrink-0"></div>
            </div>

            <!-- TABEL TALENT GRID KOSONG (WADAH API) -->
            <div id="talentGrid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6 min-h-[500px] content-start">
                <div class="col-span-full py-20 text-center flex flex-col items-center">
                    <div class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4 shadow-lg shadow-indigo-500/20"></div>
                    <p class="text-xs font-black uppercase tracking-widest text-slate-400 animate-pulse">Menghubungkan ke Pusat Data...</p>
                </div>
            </div>

            <div class="mt-8 flex justify-center bg-white p-3 rounded-2xl border border-slate-200 shadow-sm">
                <!-- WADAH PAPAN PAGING API BAWAH -->
                <div id="paginationControlsBot" class="flex items-center justify-center gap-1 sm:gap-1.5 w-full md:w-auto overflow-x-auto no-scrollbar"></div>
            </div>

        </div>
    </div>

<!-- ============================================== -->
<!-- SCRIPT JS ORLAND TALENT ENGINE -->
<!-- ============================================== -->
<script>
    function toggleFilterSidebar() {
        const sidebar = document.getElementById('sidebarFilter');
        const overlay = document.getElementById('filterOverlay');
        if (sidebar.classList.contains('-translate-x-full')) {
            sidebar.classList.remove('-translate-x-full');
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.remove('opacity-0'), 10);
        } else {
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('opacity-0');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }
    }

    const API_BASE = "https://api.orlandmanagement.com/api/v1";

    let ALL_TALENTS = [];
    let FILTERED_TALENTS = [];
    let CURRENT_PAGE = 1;
    let PER_PAGE = 16; 

    document.addEventListener("DOMContentLoaded", () => {
        // Daftarkan aksi setiap kali Filter berubah - LIVE SEARCH ENABLED
        document.querySelectorAll("input[type='radio'], select, input[type='text']").forEach(el => {
            el.addEventListener("change", applyFilters);
            el.addEventListener("input", applyFilters);
        });

        // Download data dari API Database KV
        fetchTalents();
    });

    function resetFilters() {
        document.getElementById("filterSearch").value = "";
        document.getElementById("filterLocation").value = "";
        document.getElementById("filterCategory").value = "";
        document.getElementById("filterHeight").value = "";
        document.getElementById("filterAge").value = "";
        document.querySelector("input[name='gender'][value='All']").checked = true;
        applyFilters();
    }

    async function fetchTalents() {
        const grid = document.getElementById("talentGrid");
        if (!grid) return;
        
        try {
            const response = await fetch(`${API_BASE}/public/talents`);
            const result = await response.json();

            if (result.status === 'ok') {
                ALL_TALENTS = result.data;
                FILTERED_TALENTS = [...ALL_TALENTS];
                renderGrid();
            } else {
                grid.innerHTML = `<div class="col-span-full py-10 text-center text-red-500 font-bold bg-red-50 rounded-2xl border border-red-200">Terjadi kesalahan pada Server Database Orland.</div>`;
            }
        } catch (err) {
            console.error(err);
            grid.innerHTML = `<div class="col-span-full py-10 text-center text-amber-500 font-bold bg-amber-50 rounded-2xl border border-amber-200">API Gateway Tidak Merespon. Pastikan server API hidup.</div>`;
        }
    }

    function applyFilters() {
        const searchVal = document.getElementById("filterSearch")?.value.toLowerCase() || "";
        const locVal = document.getElementById("filterLocation")?.value.toLowerCase() || "";
        const categorySelect = document.getElementById("filterCategory")?.value || "";
        const heightSelect = document.getElementById("filterHeight")?.value || "";
        const ageSelect = document.getElementById("filterAge")?.value || "";
        
        let selectedGender = "All";
        document.querySelectorAll("input[name='gender']").forEach(r => {
            if(r.checked) selectedGender = r.value;
        });

        FILTERED_TALENTS = ALL_TALENTS.filter(t => {
            if (searchVal && !(t.name || "").toLowerCase().includes(searchVal)) return false;
            
            if (locVal && !(t.location || "").toLowerCase().includes(locVal)) return false;

            if (selectedGender !== "All" && t.gender !== selectedGender) return false;
            
            if (categorySelect) {
                const catStr = (t.category || "").toLowerCase();
                if (!catStr.includes(categorySelect.toLowerCase())) return false;
            }

            if (heightSelect) {
                const parts = heightSelect.split("-");
                const minH = parseInt(parts[0]); const maxH = parseInt(parts[1]);
                const tHeight = parseInt(t.height) || 0;
                if (tHeight < minH || tHeight > maxH) return false;
            }

            if (ageSelect) {
                const parts = ageSelect.split("-");
                const minA = parseInt(parts[0]); const maxA = parseInt(parts[1]);
                const tAge = parseInt(t.age) || 0;
                if (tAge < minA || tAge > maxA) return false;
            }

            return true;
        });

        CURRENT_PAGE = 1;
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById("talentGrid");
        if (!grid) return;

        const startIndex = (CURRENT_PAGE - 1) * PER_PAGE;
        const paginated = FILTERED_TALENTS.slice(startIndex, startIndex + PER_PAGE);

        document.getElementById("totalCountDisplay").innerText = FILTERED_TALENTS.length;

        if (paginated.length === 0) {
            grid.innerHTML = `<div class="col-span-full py-20 text-center bg-slate-50 flex flex-col justify-center items-center rounded-3xl border border-dashed border-slate-300 w-full"><div class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-sm mb-4"><i class="fa-solid fa-ghost text-5xl text-slate-300"></i></div><p class="text-slate-500 font-extrabold text-lg">Tidak ada talent yang cocok dengan filter Anda.</p><button onclick="resetFilters()" class="mt-4 px-6 py-2 bg-indigo-500 text-white font-bold rounded-xl hover:bg-indigo-600 transition-colors">Reset Filter</button></div>`;
            renderPaginationControls();
            return;
        }

        let html = "";
        paginated.forEach((talent, i) => {
            let theme = "indigo"; let icon = "venus";
            const cat = talent.category || "Talent";
            if(cat.toLowerCase().includes('actor')) theme = "emerald";
            else if(cat.toLowerCase().includes('model')) theme = "amber";
            else if(cat.toLowerCase().includes('mc')) theme = "purple";
            else if(cat.toLowerCase().includes('singer')) theme = "rose";
            if(talent.gender === 'Male') icon = "mars";
            
            const fallbackImg = `https://ui-avatars.com/api/?name=${encodeURIComponent(talent.name)}&background=6366f1&color=fff&size=500`;

            const indexDelay = (i % PER_PAGE) * 20;

            html += `
            <a href="https://talent.orlandmanagement.com/p/${talent.id}" target="_blank" class="bg-white rounded-3xl overflow-hidden border border-slate-100 shadow-sm hover:shadow-[0_20px_40px_rgba(79,70,229,0.15)] hover:border-indigo-200 transition-all duration-500 group flex flex-col relative transform hover:-translate-y-2 cursor-pointer animate-in fade-in slide-in-from-bottom-4" style="animation-duration: 400ms; animation-delay: ${indexDelay}ms; animation-fill-mode: both;">
                
                <div class="w-full aspect-[4/5] relative overflow-hidden bg-slate-100">
                    <!-- Badges Top -->
                    <div class="absolute top-3 left-3 z-20"><span class="text-[9px] font-black uppercase tracking-widest bg-${theme}-500 text-white px-2.5 py-1 rounded-md shadow-sm border border-${theme}-400/50">${cat}</span></div>
                    <div class="absolute top-3 right-3 z-20"><div class="w-7 h-7 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center text-white text-xs border border-white/20"><i class="fa-solid fa-${icon}"></i></div></div>
                    
                    <img src="${talent.headshot || fallbackImg}" alt="${talent.name}" loading="lazy" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    
                    <!-- Availability -->
                    <div class="absolute bottom-3 right-3 z-20 flex items-center gap-1.5 bg-slate-900/60 backdrop-blur px-2 py-1 rounded-md border border-white/20">
                        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                        <span class="text-[8px] font-bold text-white uppercase tracking-widest">Available</span>
                    </div>

                    <!-- Overlay Hover Dark -->
                    <div class="absolute inset-x-0 bottom-0 outline-none w-full h-[50%] bg-gradient-to-t from-slate-900/90 via-slate-900/40 to-transparent"></div>
                    <div class="absolute inset-0 bg-slate-900/40 opacity-0 group-hover:opacity-100 transition-all duration-500 flex flex-col items-center justify-center z-10 backdrop-blur-[2px]">
                        <div class="transform translate-y-4 group-hover:translate-y-0 transition-transform duration-500 text-center bg-white/20 px-6 py-3 border border-white/30 rounded-2xl">
                            <i class="fa-solid fa-expand text-white text-xl mb-1"></i>
                            <span class="block text-white text-xs font-bold uppercase tracking-widest">Full Profile</span>
                        </div>
                    </div>
                </div>
                
                <div class="p-4 sm:p-5 flex flex-col flex-1 bg-white relative z-20">
                    <h3 class="font-black text-slate-900 text-base leading-tight truncate transition-colors mb-2.5 group-hover:text-indigo-600">${talent.name}</h3>
                    <div class="flex flex-wrap gap-2 text-[10px] text-slate-500 font-bold tracking-wide">
                        ${talent.age ? `<span class="bg-slate-50 px-2 py-1 rounded-md border border-slate-100 flex items-center"><i class="fa-solid fa-${icon} mr-1 opacity-50"></i>${talent.age} Thn</span>` : ''}
                        ${talent.height ? `<span class="bg-slate-50 px-2 py-1 rounded-md border border-slate-100 flex items-center"><i class="fa-solid fa-arrows-up-down mr-1 opacity-50"></i>${talent.height} cm</span>` : ''}
                        ${talent.location ? `<span class="bg-slate-50 px-2 py-1 rounded-md border border-slate-100 flex items-center"><i class="fa-solid fa-location-dot mr-1 opacity-50 text-indigo-500"></i>${talent.location}</span>` : ''}
                    </div>
                </div>
            </a>`;
        });

        grid.innerHTML = html;
        renderPaginationControls();
    }

    function renderPaginationControls() {
        const controls1 = document.getElementById("paginationControlsTop");
        const controls2 = document.getElementById("paginationControlsBot");
        const totalPages = Math.ceil(FILTERED_TALENTS.length / PER_PAGE);
        
        if (!controls1 || !controls2) return;
        
        if (totalPages <= 1) {
             controls1.innerHTML = "";
             controls2.innerHTML = "";
             return;
        }

        let btnHtml = "";
        
        btnHtml += `<button ${CURRENT_PAGE === 1 ? 'disabled' : ''} onclick="goToPage(${CURRENT_PAGE - 1})" class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl border border-slate-200 flex items-center justify-center text-slate-400 hover:border-indigo-500 hover:text-indigo-600 transition-all ${CURRENT_PAGE === 1 ? 'opacity-50 cursor-not-allowed bg-slate-50' : 'bg-white shadow-sm'}"><i class="fa-solid fa-chevron-left text-xs"></i></button>`;

        let startPage = Math.max(1, CURRENT_PAGE - 2);
        let endPage = Math.min(totalPages, CURRENT_PAGE + 2);
        
        if (startPage > 1) {
            btnHtml += `<button onclick="goToPage(1)" class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl border border-slate-200 text-slate-600 hover:border-indigo-500 hover:text-indigo-600 hover:bg-slate-50 font-bold transition-all text-[13px] mx-0.5 bg-white shadow-sm">1</button>`;
            if (startPage > 2) btnHtml += `<span class="px-1 text-slate-400 text-xs">...</span>`;
        }

        for(let i=startPage; i<=endPage; i++) {
             let activeTheme = i === CURRENT_PAGE ? "bg-indigo-600 border-indigo-600 text-white shadow-md transform scale-105" : "border border-slate-200 text-slate-600 hover:border-indigo-500 hover:text-indigo-600 hover:bg-slate-50 bg-white shadow-sm";
             btnHtml += `<button onclick="goToPage(${i})" class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl ${activeTheme} font-bold transition-all text-[13px] mx-0.5">${i}</button>`;
        }

        if (endPage < totalPages) {
            if (endPage < totalPages - 1) btnHtml += `<span class="px-1 text-slate-400 text-xs">...</span>`;
            btnHtml += `<button onclick="goToPage(${totalPages})" class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl border border-slate-200 text-slate-600 hover:border-indigo-500 hover:text-indigo-600 hover:bg-slate-50 font-bold transition-all text-[13px] mx-0.5 bg-white shadow-sm">${totalPages}</button>`;
        }

        btnHtml += `<button ${CURRENT_PAGE === totalPages || totalPages === 0 ? 'disabled' : ''} onclick="goToPage(${CURRENT_PAGE + 1})" class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl border border-slate-200 flex items-center justify-center text-slate-400 hover:border-indigo-500 hover:text-indigo-600 transition-all ${(CURRENT_PAGE === totalPages || totalPages === 0) ? 'opacity-50 cursor-not-allowed bg-slate-50' : 'hover:bg-slate-50 bg-white shadow-sm'}"><i class="fa-solid fa-chevron-right text-xs"></i></button>`;

        controls1.innerHTML = btnHtml;
        controls2.innerHTML = btnHtml;
    }

    function goToPage(page) {
        if(page < 1 || page > Math.ceil(FILTERED_TALENTS.length / PER_PAGE)) return;
        CURRENT_PAGE = page;
        renderGrid();
        
        const gridTop = document.getElementById("talentGrid").getBoundingClientRect().top + window.pageYOffset - 100;
        window.scrollTo({ top: gridTop, behavior: 'smooth' });
    }
</script>
